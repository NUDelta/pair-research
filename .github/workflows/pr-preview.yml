name: 🚀 PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/README.md'

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: 🌐 Cloudflare Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SITE_BASE_URL: ${{ secrets.VITE_SITE_BASE_URL }}
      R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_CLOUDFLARE_TURNSTILE_SITE_KEY }}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: 🧱 Setup Node (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: 📦 Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Run build
        run: pnpm run build

      - name: 🚀 Upload Worker Version (Preview)
        id: wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}

      - name: 🔗 Extract preview URL
        id: preview
        if: always()
        shell: bash
        env:
          CMD_OUTPUT: ${{ steps.wrangler.outputs.command-output }}
        run: |
          printf "%s\n" "$CMD_OUTPUT" > wrangler_output.txt
          PREVIEW_URL="$(grep -Eo 'https://[^ ]+\.workers\.dev/?' wrangler_output.txt | head -n 1 || true)"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: 🧾 Write preview summary
        if: always()
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          WRANGLER_RESULT: ${{ steps.wrangler.outcome }}
        run: |
          {
            echo "## 🌐 PR Preview"
            echo ""
            echo "- 🚀 Preview deploy: **${WRANGLER_RESULT:-skipped}**"
            if [ -n "$PREVIEW_URL" ]; then
              echo "- 🔗 Preview URL: $PREVIEW_URL"
            else
              echo "- 🔗 Preview URL: (not available)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 💬 Upsert preview PR comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          WRANGLER_RESULT: ${{ steps.wrangler.outcome }}
        with:
          script: |
            const marker = "<!-- pair-research-pr-preview -->";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const previewUrl = process.env.PREVIEW_URL || "";
            const result = process.env.WRANGLER_RESULT || "skipped";
            const icon = result === "success" ? "✅" : result === "failure" ? "❌" : "⏭️";

            const body = [
              marker,
              "### 🌐 Pair Research PR Preview",
              "",
              `- 🚀 Preview deploy: ${icon} **${result}**`,
              previewUrl ? `- 🔗 Preview URL: ${previewUrl}` : "- 🔗 Preview URL: (not available)",
              "",
              `🔗 Run: ${runUrl}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
