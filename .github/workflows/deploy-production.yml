name: 🏗️ Production Deploy (main only)

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

jobs:
  deploy:
    name: 🚀 Deploy to Cloudflare Worker (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: production-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SITE_BASE_URL: ${{ secrets.VITE_SITE_BASE_URL }}
      R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_CLOUDFLARE_TURNSTILE_SITE_KEY }}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: 🧱 Setup Node (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: 📦 Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: 🚨 Lint Code
        run: pnpm run lint:ci

      - name: 🎭 Install Playwright browsers
        run: pnpm run test:e2e:install

      - name: 🧪 Run tests
        run: pnpm run test

      - name: ✅ Run build
        run: pnpm run build

      - name: 🚀 Deploy Worker (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy
