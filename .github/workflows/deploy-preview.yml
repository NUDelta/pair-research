name: 🔎 PR CI · Lint / Test / Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/README.md'
jobs:
  pr-ci:
    name: 🧪 Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: pr-ci-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      pull-requests: write
      issues: write

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SITE_BASE_URL: ${{ secrets.VITE_SITE_BASE_URL }}
      R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_CLOUDFLARE_TURNSTILE_SITE_KEY }}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: 🧱 Setup Node (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: 📦 Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: 🚨 Lint
        id: lint
        continue-on-error: true
        run: pnpm run lint:ci

      - name: 🧾 Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm run typecheck

      - name: 🧪 Unit tests
        id: unit_test
        continue-on-error: true
        run: pnpm run test:unit

      - name: 🎭 Install Playwright browsers
        run: pnpm run test:e2e:install

      - name: 🎭 Prepare Playwright output dir
        run: mkdir -p output/playwright

      - name: 🎭 E2E tests
        id: e2e_test
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_FILE: output/playwright/report.json
        run: pnpm exec playwright test --reporter=line,json

      - name: 🏗️ Build
        id: build
        continue-on-error: true
        run: pnpm run build

      - name: 🧾 Compute CI summary
        id: ci_summary
        if: always()
        shell: bash
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          UNIT_TEST_OUTCOME: ${{ steps.unit_test.outcome }}
          E2E_TEST_OUTCOME: ${{ steps.e2e_test.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          node <<'EOF'
          const fs = require('fs');

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const outPath = process.env.GITHUB_OUTPUT;

          const outcomes = {
            lint: process.env.LINT_OUTCOME || 'skipped',
            typecheck: process.env.TYPECHECK_OUTCOME || 'skipped',
            unit: process.env.UNIT_TEST_OUTCOME || 'skipped',
            e2e: process.env.E2E_TEST_OUTCOME || 'skipped',
            build: process.env.BUILD_OUTCOME || 'skipped',
          };

          const icon = (o) => o === 'success' ? '✅' : o === 'failure' ? '❌' : '⏭️';

          let total = 0;
          let passed = 0;
          let failed = 0;
          let skipped = 0;
          let unknown = 0;
          let parseWarning = '';
          const failedTests = [];

          const reportPath = 'output/playwright/report.json';

          function classifyTest(test) {
            const statuses = (test.results || []).map(r => r.status).filter(Boolean);

            if (statuses.includes('passed')) return 'passed';
            if (statuses.some(s => s === 'failed' || s === 'timedOut' || s === 'interrupted')) return 'failed';
            if (statuses.length > 0 && statuses.every(s => s === 'skipped')) return 'skipped';
            return 'unknown';
          }

          function visitSuite(suite, parents = []) {
            const titleParts = [...parents, suite.title].filter(Boolean);

            for (const spec of suite.specs || []) {
              for (const test of spec.tests || []) {
                total += 1;

                const fullName = [...titleParts, spec.title].filter(Boolean).join(' › ');
                const classification = classifyTest(test);

                if (classification === 'passed') {
                  passed += 1;
                } else if (classification === 'failed') {
                  failed += 1;
                  failedTests.push(fullName);
                } else if (classification === 'skipped') {
                  skipped += 1;
                } else {
                  unknown += 1;
                }
              }
            }

            for (const child of suite.suites || []) {
              visitSuite(child, titleParts);
            }
          }

          if (fs.existsSync(reportPath)) {
            try {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              for (const suite of report.suites || []) {
                visitSuite(suite, []);
              }
            } catch (err) {
              parseWarning = `Failed to parse Playwright report: ${err.message}`;
            }
          }

          const lines = [];
          lines.push('## 🧪 CI Results');
          lines.push('');
          lines.push(`- 🚨 Lint: ${icon(outcomes.lint)} **${outcomes.lint}**`);
          lines.push(`- 🧾 Typecheck: ${icon(outcomes.typecheck)} **${outcomes.typecheck}**`);
          lines.push(`- 🧪 Unit tests: ${icon(outcomes.unit)} **${outcomes.unit}**`);
          lines.push(`- 🎭 E2E tests: ${icon(outcomes.e2e)} **${outcomes.e2e}**`);
          lines.push(`- 🏗️ Build: ${icon(outcomes.build)} **${outcomes.build}**`);
          lines.push('');

          if (total > 0) {
            lines.push(`- 🎯 E2E passed: **${passed} / ${total}**`);
            lines.push(`- ⏭️ E2E skipped: **${skipped}**`);
            lines.push(`- ❌ E2E failed: **${failed}**`);
            if (unknown > 0) {
              lines.push(`- ❓ E2E unknown: **${unknown}**`);
            }
            lines.push('');
          }

          if (failedTests.length > 0) {
            lines.push('### Failed E2E tests');
            lines.push('');
            for (const name of failedTests) {
              lines.push(`- ${name}`);
            }
            lines.push('');
          }

          if (parseWarning) {
            lines.push('### E2E report warning');
            lines.push('');
            lines.push(`- ${parseWarning}`);
            lines.push('');
          }

          const hasFailure =
            outcomes.lint === 'failure' ||
            outcomes.typecheck === 'failure' ||
            outcomes.unit === 'failure' ||
            outcomes.e2e === 'failure' ||
            outcomes.build === 'failure';

          fs.appendFileSync(summaryPath, lines.join('\n') + '\n');
          fs.appendFileSync(outPath, `has_failure=${hasFailure}\n`);
          fs.appendFileSync(outPath, `failed_e2e_tests=${JSON.stringify(failedTests)}\n`);
          fs.appendFileSync(outPath, `e2e_passed=${passed}\n`);
          fs.appendFileSync(outPath, `e2e_total=${total}\n`);
          fs.appendFileSync(outPath, `e2e_failed=${failed}\n`);
          fs.appendFileSync(outPath, `e2e_skipped=${skipped}\n`);
          fs.appendFileSync(outPath, `e2e_unknown=${unknown}\n`);
          EOF

      - name: 🚀 Upload Worker Version (Preview)
        id: wrangler
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}

      - name: 🔗 Extract preview URL
        id: preview
        if: steps.wrangler.conclusion == 'success'
        shell: bash
        env:
          CMD_OUTPUT: ${{ steps.wrangler.outputs.command-output }}
        run: |
          printf "%s\n" "$CMD_OUTPUT" > wrangler_output.txt
          PREVIEW_URL="$(grep -Eo 'https://[^ ]+\.workers\.dev/?' wrangler_output.txt | head -n 1 || true)"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

          {
            echo "### Cloudflare Workers Preview"
            if [ -n "$PREVIEW_URL" ]; then
              echo ""
              echo "- $PREVIEW_URL"
            else
              echo ""
              echo "- (No preview URL found in Wrangler output. Check wrangler_output.txt in logs.)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 💬 Upsert PR Comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          UNIT_TEST_OUTCOME: ${{ steps.unit_test.outcome }}
          E2E_TEST_OUTCOME: ${{ steps.e2e_test.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          E2E_PASSED: ${{ steps.ci_summary.outputs.e2e_passed }}
          E2E_TOTAL: ${{ steps.ci_summary.outputs.e2e_total }}
          E2E_FAILED: ${{ steps.ci_summary.outputs.e2e_failed }}
          E2E_SKIPPED: ${{ steps.ci_summary.outputs.e2e_skipped }}
          E2E_UNKNOWN: ${{ steps.ci_summary.outputs.e2e_unknown }}
          FAILED_E2E_TESTS: ${{ steps.ci_summary.outputs.failed_e2e_tests }}
        with:
          script: |
            const marker = "<!-- pair-research-ci -->";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const icon = (o) => (o === "success" ? "✅" : o === "failure" ? "❌" : "⏭️");

            const lint = process.env.LINT_OUTCOME || "skipped";
            const typecheck = process.env.TYPECHECK_OUTCOME || "skipped";
            const unit = process.env.UNIT_TEST_OUTCOME || "skipped";
            const e2e = process.env.E2E_TEST_OUTCOME || "skipped";
            const build = process.env.BUILD_OUTCOME || "skipped";
            const previewUrl = process.env.PREVIEW_URL || "";
            const e2ePassed = process.env.E2E_PASSED || "0";
            const e2eTotal = process.env.E2E_TOTAL || "0";
            const e2eFailed = process.env.E2E_FAILED || "0";
            const e2eSkipped = process.env.E2E_SKIPPED || "0";
            const e2eUnknown = process.env.E2E_UNKNOWN || "0";

            let failedTests = [];
            try {
              failedTests = JSON.parse(process.env.FAILED_E2E_TESTS || "[]");
            } catch {}

            const body = [
              marker,
              "### 🧪 Pair Research PR CI",
              "",
              previewUrl ? `🔗 Preview this build at: ${previewUrl}` : "🔗 Preview: (not available)",
              "",
              `- 🚨 Lint: ${icon(lint)} **${lint}**`,
              `- 🧾 Typecheck: ${icon(typecheck)} **${typecheck}**`,
              `- 🧪 Unit tests: ${icon(unit)} **${unit}**`,
              `- 🎭 E2E tests: ${icon(e2e)} **${e2e}**`,
              `- 🏗️ Build: ${icon(build)} **${build}**`,
              "",
              `- 🎯 E2E passed: **${e2ePassed} / ${e2eTotal}**`,
              `- ⏭️ E2E skipped: **${e2eSkipped}**`,
              `- ❌ E2E failed: **${e2eFailed}**`,
              ...(e2eUnknown !== "0" ? [`- ❓ E2E unknown: **${e2eUnknown}**`] : []),
              "",
              ...(failedTests.length
                ? ["#### Failed E2E tests", "", ...failedTests.map(name => `- ${name}`), ""]
                : []),
              `🔗 Run: ${runUrl}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: ❌ Fail job if any required check failed
        if: always() && steps.ci_summary.outputs.has_failure == 'true'
        run: |
          echo "One or more required CI checks failed."
          exit 1
