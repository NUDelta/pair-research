name: 🔎 PR CI · Lint / Test / Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/README.md'
jobs:
  pr-ci:
    name: 🧪 Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: pr-ci-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      pull-requests: write
      issues: write

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SITE_BASE_URL: ${{ secrets.VITE_SITE_BASE_URL }}
      R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      VITE_CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_CLOUDFLARE_TURNSTILE_SITE_KEY }}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: 🧱 Setup Node (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: 📦 Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: 🚨 Lint
        id: lint
        run: pnpm run lint:ci

      - name: 🧾 Typecheck
        id: typecheck
        run: pnpm run typecheck

      - name: 🧪 Test
        id: test
        run: pnpm run test

      - name: 🏗️ Build
        id: build
        run: pnpm run build

      - name: 🧾 Job Summary
        if: always()
        shell: bash
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          {
            echo "## 🧪 CI Results"
            echo ""
            echo "- 🚨 Lint: **$LINT_OUTCOME**"
            echo "- 🧪 Test: **$TEST_OUTCOME**"
            echo "- 🧾 Typecheck: **$TYPECHECK_OUTCOME**"
            echo "- 🏗️ Build: **$BUILD_OUTCOME**"
            echo ""
            echo "🔗 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # PR Preview
      - name: 🚀 Upload Worker Version (Preview)
        id: wrangler
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}

      - name: 🔗 Extract preview URL
        id: preview
        if: steps.wrangler.conclusion == 'success'
        shell: bash
        env:
          CMD_OUTPUT: ${{ steps.wrangler.outputs.command-output }}
        run: |
          printf "%s\n" "$CMD_OUTPUT" > wrangler_output.txt
          PREVIEW_URL="$(grep -Eo 'https://[^ ]+\.workers\.dev/?' wrangler_output.txt | head -n 1 || true)"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

          {
            echo "### Cloudflare Workers Preview"
            if [ -n "$PREVIEW_URL" ]; then
              echo ""
              echo "- $PREVIEW_URL"
            else
              echo ""
              echo "- (No preview URL found in Wrangler output. Check wrangler_output.txt in logs.)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 💬 Upsert PR Comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
        with:
          script: |
            const marker = "<!-- pair-research-ci -->";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const icon = (o) => (o === "success" ? "✅" : o === "failure" ? "❌" : "⏭️");
            const lint = process.env.LINT_OUTCOME || "skipped";
            const test = process.env.TEST_OUTCOME || "skipped";
            const typecheck = process.env.TYPECHECK_OUTCOME || "skipped";
            const build = process.env.BUILD_OUTCOME || "skipped";
            const previewUrl = process.env.PREVIEW_URL || "";

            const previewUrl = `${{ steps.preview.outputs.preview_url }}`;

            const body = [
              marker,
              "### 🧪 Pair Research PR CI",
              "",
              previewUrl ? `🔗 Preview this build at: ${previewUrl}` : "🔗 Preview: (not available)",
              "",
              `- 🚨 Lint: ${icon(lint)} **${lint}**`,
              `- 🧪 Test: ${icon(test)} **${test}**`,
              `- 🧾 Typecheck: ${icon(typecheck)} **${typecheck}**`,
              `- 🏗️ Build: ${icon(build)} **${build}**`,
              "",
              `🔗 Run: ${runUrl}`
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
